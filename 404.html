<!DOCTYPE html>
<html lang="nl-NL">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagina niet gevonden · AI-geletterdheid voor het mbo</title>
<meta name="robots" content="noindex">
<style>
:root{--bg:#0a0a14;--text:#f5f5f7;--text-dim:#a8a8b3;--purple:#a855f7;--amber:#f59e0b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;line-height:1.6}
main{max-width:480px;text-align:center}
h1{font-size:clamp(3rem,10vw,5rem);font-weight:800;letter-spacing:-0.04em;background:linear-gradient(135deg,var(--purple),var(--amber));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1rem}
p{color:var(--text-dim);margin-bottom:2rem}
a.btn{display:inline-block;padding:1rem 2rem;background:linear-gradient(135deg,var(--purple),var(--amber));color:#0a0a14;font-weight:700;border-radius:0.5rem;text-decoration:none;transition:transform .2s}
a.btn:hover{transform:translateY(-2px)}
</style>
</head>
<body>
<main>
<h1>404</h1>
<p>Deze pagina kunnen we niet vinden. Maar wat we wél hebben, daar wil je nu naartoe.</p>
<a href="/" class="btn">Terug naar de start →</a>
</main>
</body>
</html>
